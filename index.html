<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#101820" />
    <title>Bounce and Collect</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: #101820;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      /* 盤面はスコアとコントロールの間に収める */
      #stage {
        position: fixed;
        left: 0;
        right: 0;
        top: calc(74px + env(safe-area-inset-top, 0));
        bottom: calc(86px + env(safe-area-inset-bottom, 0));
        touch-action: none; /* ドラッグでページが動かないように */
      }
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: calc(10px + env(safe-area-inset-top, 0)) 16px 10px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        pointer-events: none;
      }
      #score {
        font: 800 40px/1.05 system-ui, -apple-system, sans-serif;
        font-variant-numeric: tabular-nums;
        color: #fff;
        letter-spacing: -0.02em;
      }
      #hint {
        font: 600 12px system-ui, sans-serif;
        color: #9fb3c4;
        margin-top: 2px;
      }
      #controls {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        padding: 8px 12px calc(10px + env(safe-area-inset-bottom, 0));
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      button {
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        background: #2c74ad;
        color: #fff;
        font: 700 16px system-ui, sans-serif;
      }
      button.active { background: #13967f; }
      button:active { opacity: 0.75; }

      #result {
        position: fixed;
        inset: 0;
        background: rgba(8, 14, 20, 0.93);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 10;
      }
      #result[hidden] { display: none; }
      .panel {
        width: 100%;
        max-width: 420px;
        background: #17222c;
        border-radius: 18px;
        padding: 28px 24px 24px;
        color: #eef4f8;
        text-align: center;
        font: 15px/1.6 system-ui, sans-serif;
      }
      .panel .label {
        font-size: 13px;
        color: #9fb3c4;
        letter-spacing: 0.1em;
      }
      #final-score {
        font: 800 52px/1.1 system-ui, sans-serif;
        font-variant-numeric: tabular-nums;
        color: #7ee2b8;
        margin: 6px 0 20px;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>

    <div id="hud">
      <div id="score">0</div>
      <div id="hint">画面をなぞってコップを動かす</div>
    </div>

    <div id="controls">
      <button data-speed="1" class="active">1x</button>
      <button data-speed="2">2x</button>
      <button data-speed="4">4x</button>
      <button id="retry">もう一回</button>
    </div>

    <div id="result" hidden>
      <div class="panel">
        <div class="label">SCORE</div>
        <div id="final-score">0</div>
        <button id="again">もう一回</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
