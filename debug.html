<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#101820" />
    <title>デバッグ — bounce-collect</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: #101820;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #wrap { display: flex; flex-direction: column; height: 100%; }
      #stage { flex: 1 1 auto; min-height: 0; position: relative; touch-action: none; }
      #panel {
        flex: 0 0 auto;
        background: rgba(0, 0, 0, 0.72);
        backdrop-filter: blur(8px);
        padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0));
        color: #eef4f8;
        max-height: 52vh;
        overflow: auto;
      }
      .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
      button {
        min-height: 42px;
        border: 0;
        border-radius: 10px;
        background: #2c74ad;
        color: #fff;
        font: 700 14px system-ui, sans-serif;
      }
      button.active { background: #13967f; }
      button.warm { background: #b9622b; }
      button:active { opacity: 0.75; }
      .stat {
        font: 600 13px/1.6 system-ui, sans-serif;
        color: #cfe0ec;
        margin: 6px 0 4px;
        font-variant-numeric: tabular-nums;
      }
      .stat b { color: #7ee2b8; }
      table { width: 100%; border-collapse: collapse; font-size: 12px; }
      th, td {
        padding: 3px 4px;
        border-bottom: 1px solid #26364а;
        border-bottom: 1px solid #26364a;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      th { color: #8fa6b8; font-size: 11px; font-weight: 700; }
      td.new { color: #7ee2b8; font-weight: 700; }
      td.used { color: #ff9f7a; }
      .note { font-size: 11.5px; color: #8fa6b8; margin-top: 6px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="stage"></div>
      <div id="panel">
        <div class="row">
          <button data-preset="single-gate" class="active">ゲート1</button>
          <button data-preset="two-gates">ゲート2</button>
          <button data-preset="gate-jumper">ゲート+台</button>
          <button id="reset" class="warm">リセット</button>
        </div>
        <div class="row">
          <button id="drop">玉を1個落とす</button>
          <button id="stepone">1フレーム</button>
          <button id="step10">10フレーム</button>
          <button id="play">再生</button>
        </div>
        <div class="stat" id="stat">-</div>
        <div id="gates"></div>
        <table>
          <thead>
            <tr>
              <th>#</th><th>x</th><th>y</th><th>weight</th>
              <th>通過印</th><th>bounce</th><th>状態</th>
            </tr>
          </thead>
          <tbody id="balls"></tbody>
        </table>
        <div class="note">
          「通過印」が 0 の玉は、そのゲートをもう一度通れば また増える玉。<br>
          増え方がおかしい時は、1フレームずつ進めて どの瞬間に何個増えたかを見る。
        </div>
      </div>
    </div>
    <script type="module" src="/src/debug/debugMain.ts"></script>
  </body>
</html>
