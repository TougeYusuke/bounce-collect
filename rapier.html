<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#101820" />
    <title>Rapier比較 — bounce-collect</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%; overflow: hidden; background: #101820;
        -webkit-user-select: none; user-select: none;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #wrap { display: flex; flex-direction: column; height: 100%; }
      #stage { flex: 1 1 auto; min-height: 0; position: relative; }
      #panel {
        flex: 0 0 auto; background: rgba(0,0,0,.72); backdrop-filter: blur(8px);
        padding: 8px 10px calc(10px + env(safe-area-inset-bottom, 0)); color: #eef4f8;
      }
      .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
      button {
        min-height: 44px; border: 0; border-radius: 10px;
        background: #2c74ad; color: #fff; font: 700 14px system-ui, sans-serif;
      }
      button.active { background: #13967f; }
      button.warm { background: #b9622b; }
      #fps { font: 800 26px/1.1 system-ui, sans-serif; font-variant-numeric: tabular-nums; }
      #fps.ok { color: #7ee2b8; } #fps.mid { color: #ffd54f; } #fps.bad { color: #ff8a80; }
      #stat { font: 600 13px/1.6 system-ui, sans-serif; color: #cfe0ec; font-variant-numeric: tabular-nums; }
      #stat b { color: #7ee2b8; }
      .note { font-size: 11.5px; color: #8fa6b8; margin-top: 4px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="stage"></div>
      <div id="panel">
        <div id="fps">-- fps</div>
        <div id="stat">読み込み中…</div>
        <div class="row" style="margin-top:8px">
          <button data-angle="12">12度</button>
          <button data-angle="15" class="active">15度</button>
          <button data-angle="25">25度</button>
          <button data-angle="40">40度</button>
        </div>
        <div class="row">
          <button data-friction="0">摩擦0</button>
          <button data-friction="0.02" class="active">摩擦0.02</button>
          <button data-friction="0.1">摩擦0.1</button>
          <button id="reset" class="warm">やり直す</button>
        </div>
        <div class="note">
          見るのは「玉が斜面を流れて出口から落ちるか」。<br>
          自作の物理だと 12〜15度で玉が噛み合って止まり、ほぼ回収されなかった。
        </div>
      </div>
    </div>
    <script type="module" src="/src/rapier/rapierMain.ts"></script>
  </body>
</html>
